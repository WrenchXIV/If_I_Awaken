  <text x="800" y="180" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2.5" text-anchor="middle">RED CARPET</text>
  <rect x="620" y="310" width="360" height="270" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
  <text x="800" y="450" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="22" font-weight="500" text-anchor="middle">Lobby</text>
  <text x="800" y="475" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2.5" text-anchor="middle">BAR · GIFTSHOP</text>

  <path d="M 620 200 L 470 200" stroke="#5a5340" stroke-width="1" fill="none" stroke-dasharray="3,4" opacity="0.5" marker-end="url(#wsArrow)"/>

  <g transform="translate(950, 50)">
    <circle r="14" fill="none" stroke="#3a3128" stroke-width="0.5"/>
    <text y="-2" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="1" text-anchor="middle">N</text>
    <line x1="0" y1="2" x2="0" y2="10" stroke="#5a5340" stroke-width="0.5"/>
  </g>
