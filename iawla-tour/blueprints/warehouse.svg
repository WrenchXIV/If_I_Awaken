<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="2000" height="1200" aria-label="Warehouse layout">
  <rect width="1000" height="600" fill="#0a0908"/>
  <defs>
    <marker id="wsArrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#5a5340"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="960" height="560" fill="none" stroke="#2a2420" stroke-width="1" stroke-dasharray="3,4"/>
  <rect x="20" y="20" width="560" height="560" fill="#0e0c0a" stroke="#3a3128" stroke-width="1"/>
  <rect x="20" y="20" width="200" height="100" fill="#14110f" stroke="#2a2420" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="120" y="73" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" text-anchor="middle">BACK OF HOUSE</text>

  <g class="ws-space" data-space="06">
    <rect x="220" y="20" width="160" height="160" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
    <text x="300" y="100" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="38" font-weight="500" text-anchor="middle">06</text>
    <text x="300" y="125" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" text-anchor="middle">STAGE · SEATING</text>
  </g>
  <g class="ws-space" data-space="01">
    <rect x="380" y="120" width="80" height="440" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
    <rect x="380" y="140" width="3" height="400" fill="#3a3128"/>
    <text x="420" y="350" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="38" font-weight="500" text-anchor="middle" transform="rotate(-90, 420, 350)">01</text>
    <text x="420" y="378" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" text-anchor="middle" transform="rotate(-90, 420, 378)">HOLLYWOOD BLVD</text>
  </g>
  <g class="ws-space" data-space="05">
    <rect x="200" y="180" width="180" height="200" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
    <text x="290" y="280" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="38" font-weight="500" text-anchor="middle">05</text>
    <text x="290" y="305" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" text-anchor="middle">FOLK LA</text>
  </g>
  <g class="ws-space" data-space="04">
    <rect x="20" y="200" width="180" height="180" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
    <text x="110" y="290" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="38" font-weight="500" text-anchor="middle">04</text>
    <text x="110" y="315" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" text-anchor="middle">BLACK LA</text>
  </g>
  <g class="ws-space" data-space="03">
    <rect x="20" y="380" width="180" height="200" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
    <text x="110" y="475" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="38" font-weight="500" text-anchor="middle">03</text>
    <text x="110" y="500" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" text-anchor="middle">ASIAN LA</text>
  </g>
  <g class="ws-space" data-space="02">
    <rect x="200" y="380" width="180" height="200" fill="#14110f" stroke="#3a3128" stroke-width="1"/>
    <text x="290" y="475" fill="#5a5340" font-family="Playfair Display, serif" font-style="italic" font-size="38" font-weight="500" text-anchor="middle">02</text>
    <text x="290" y="500" fill="#5a5340" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="2" text-anchor="middle">BOYLE HEIGHTS</text>
  </g>

  <circle cx="200" cy="380" r="36" fill="#181512" stroke="#5a5340" stroke-width="1"/>
